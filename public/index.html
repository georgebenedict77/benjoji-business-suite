<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Benjoji Business Suite is a business management platform for point of sale, inventory, debt tracking, reporting, access control, and operational recovery."
    />
    <meta name="theme-color" content="#0b0b0f" />
    <meta name="application-name" content="Benjoji Business Suite" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Benjoji Suite" />
    <title>Benjoji Business Suite</title>
    <link rel="icon" type="image/png" href="/benjoji-business-suite-logo.png" />
    <link rel="apple-touch-icon" href="/benjoji-business-suite-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/client.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="/client.js" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((error) => {
            console.error("Service worker registration failed:", error);
          });
        });
      }
    </script>
  </body>
</html>
